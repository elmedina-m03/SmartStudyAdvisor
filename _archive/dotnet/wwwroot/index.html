<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Quality Agent</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Sleep Quality Assessment</h1>
        
        <form id="sleepForm">
            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" required min="18" max="100">
            </div>

            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender" required>
                    <option value="">Select...</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dailySteps">Daily Steps:</label>
                <input type="number" id="dailySteps" name="dailySteps" required min="0">
            </div>

            <div class="form-group">
                <label for="physicalActivity">Physical Activity (minutes per day):</label>
                <input type="number" id="physicalActivity" name="physicalActivity" required min="0">
            </div>

            <div class="form-group">
                <label for="stressLevel">Stress Level (1-10):</label>
                <input type="number" id="stressLevel" name="stressLevel" required min="1" max="10">
            </div>

            <div class="form-group">
                <label for="sleepDuration">Sleep Duration (hours):</label>
                <input type="number" id="sleepDuration" name="sleepDuration" required min="1" max="24" step="0.1">
            </div>

            <div class="button-group">
                <button type="submit" id="predictBtn">Submit</button>
                <button type="button" id="retrainBtn">Add new data</button>
            </div>
        </form>

        <div id="result" class="result hidden">
            <h2>Prediction Result</h2>
            <div class="result-item">
                <strong>Sleep Quality:</strong> <span id="quality"></span>
            </div>
            <div class="result-item">
                <strong>Advice:</strong> <span id="advice"></span>
            </div>
        </div>

        <div id="retrainResult" class="result hidden">
            <h2>Retrain Result</h2>
            <div class="result-item">
                <span id="retrainMessage"></span>
            </div>
        </div>

        <div id="retrainForm" class="retrain-form hidden">
            <h2>Add Labeled Data</h2>
            <p>Please provide the actual sleep quality (1-10) for this record:</p>
            <div class="form-group">
                <label for="qualityOfSleep">Quality of Sleep (1-10):</label>
                <input type="number" id="qualityOfSleep" name="qualityOfSleep" required min="1" max="10">
            </div>
            <div class="button-group">
                <button type="button" id="confirmRetrainBtn">Confirm</button>
                <button type="button" id="cancelRetrainBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
